---
# Provision and seed DEV/TST source libraries for a z/OS user.
#
# Usage:
#   ansible-playbook provision_new_dataset.yml
#   ansible-playbook provision_new_dataset.yml -e "userid=<USER07|USER08|USER09>"
#
# Creates:
#   <userid>.DEV.COBOL
#   <userid>.DEV.JCL
#   <userid>.TST.COBOL
#   <userid>.TST.JCL
#
# Seeds:
#   <userid>.DEV.COBOL
#   <userid>.DEV.JCL

- name: Provision developer datasets on z/OS
  hosts: zos
  gather_facts: false

  collections:
    - ibm.ibm_zos_core

  environment: "{{ environment_vars }}"

  vars_files:
    - racf_vars.yml

  vars:
    mlq: DEV
    seed_base: "{{ playbook_dir }}/seed_files"
    rebuild: true
    libraries:
      - mlq: DEV
        libname: COBOL
        primary_allocation: 5
        secondary_allocation: 5

      - mlq: DEV
        libname: JCL
        primary_allocation: 2
        secondary_allocation: 4

      - mlq: TST
        libname: COBOL
        primary_allocation: 5
        secondary_allocation: 5

      - mlq: TST
        libname: JCL
        primary_allocation: 2
        secondary_allocation: 4
    target_users: >-
      {{
        [userid]
        if (userid is defined and (userid | string | length) > 0)
        else (users | dict2items | map(attribute='value') | flatten | unique | sort)
      }}

  tasks:
    - name: Provision datasets for each RACF user
      ansible.builtin.include_tasks: tasks/provision_user_datasets.yml
      loop: "{{ target_users }}"
      loop_control:
        loop_var: target_user
        label: "{{ target_user }}"
      vars:
        hlq: "{{ target_user }}"
